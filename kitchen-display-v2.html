<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sugarush — Kitchen Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0F0D0B;
    --bg2:      #1A1612;
    --bg3:      #221E19;
    --gold:     #C8973A;
    --gold-lt:  #E8C97A;
    --cream:    #F5E6D0;
    --muted:    #6B5A45;
    --border:   #2E2820;
    --text:     #EDE0CC;
    --subtext:  #9B8470;

    --urgent-bg:     rgba(217,79,61,0.12);
    --urgent-border: #D94F3D;
    --urgent-text:   #F07060;

    --tinggi-bg:     rgba(224,124,42,0.12);
    --tinggi-border: #E07C2A;
    --tinggi-text:   #F09A50;

    --normal-bg:     rgba(212,160,23,0.1);
    --normal-border: #D4A017;
    --normal-text:   #E0B840;

    --santai-bg:     rgba(58,125,68,0.1);
    --santai-border: #3A7D44;
    --santai-text:   #5AAD6A;

    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }
  .logo-area { display: flex; align-items: baseline; gap: 10px; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--gold); }
  .logo-sub { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }
  .clock-area { text-align: center; }
  #clock { font-family: 'JetBrains Mono', monospace; font-size: 32px; color: var(--cream); letter-spacing: 0.05em; }
  #date-label { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .refresh-area { text-align: right; }
  #refresh-btn {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--subtext); font-family: 'DM Sans', sans-serif;
    font-size: 12px; padding: 8px 14px; border-radius: 20px; cursor: pointer;
    transition: all 0.2s;
  }
  #refresh-btn:hover { border-color: var(--gold); color: var(--gold); }
  #countdown { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex; gap: 0;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .stat {
    flex: 1; padding: 12px 20px;
    border-right: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .stat:last-child { border-right: none; }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 28px; }
  .stat-num.active  { color: var(--gold); }
  .stat-num.working { color: var(--urgent-text); }
  .stat-num.done    { color: var(--santai-text); }
  .stat-num.week    { color: #6A9BD8; }
  .stat-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; line-height: 1.4; }

  /* ── MAIN CONTENT ── */
  .content {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 0;
    flex: 1;
    overflow: hidden;
  }

  /* ── ORDER LIST ── */
  .orders-panel {
    overflow-y: auto;
    padding: 20px 20px 20px 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .panel-title {
    font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-count {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--subtext); font-size: 11px; padding: 3px 10px; border-radius: 20px;
  }

  /* ── ORDER CARD ── */
  .order-card {
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    background: var(--bg2);
    margin-bottom: 14px;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
    animation: cardIn 0.3s ease;
  }
  @keyframes cardIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .order-card.urgent { border-color: var(--urgent-border); box-shadow: 0 0 20px rgba(217,79,61,0.15); }
  .order-card.tinggi { border-color: var(--tinggi-border); }
  .order-card.normal { border-color: var(--normal-border); }
  .order-card.santai { border-color: var(--santai-border); }

  .card-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  .card-id { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: var(--muted); }
  .card-timer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .card-timer.urgent { color: var(--urgent-text); }
  .card-timer.tinggi { color: var(--tinggi-text); }
  .card-timer.normal { color: var(--normal-text); }
  .card-timer.santai { color: var(--santai-text); }

  .card-body { padding: 14px 16px; }
  .card-name { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--cream); margin-bottom: 4px; }
  .card-meta { font-size: 12px; color: var(--subtext); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .card-meta svg { width: 12px; height: 12px; flex-shrink: 0; }

  .items-list { margin-bottom: 10px; }
  .item-line {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 5px 0; border-bottom: 1px solid var(--border);
    font-size: 14px; color: var(--text);
  }
  .item-line:last-child { border-bottom: none; }
  .item-qty-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--gold); font-weight: 600;
  }

  .note-block {
    border-left: 3px solid;
    padding: 8px 10px;
    border-radius: 0 8px 8px 0;
    margin-top: 8px;
    font-size: 12px; line-height: 1.5;
  }
  .note-block.kitchen { border-color: var(--urgent-border); background: var(--urgent-bg); color: var(--urgent-text); }
  .note-block.bar     { border-color: #7A6BD8; background: rgba(122,107,216,0.1); color: #A090E8; }
  .note-label { font-weight: 700; font-size: 10px; letter-spacing: 0.1em; margin-bottom: 3px; text-transform: uppercase; }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg3);
  }
  .deadline-str { font-size: 12px; color: var(--subtext); }
  .deadline-time { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; color: var(--cream); }

  .done-btn {
    padding: 8px 20px; border-radius: 8px;
    border: 1.5px solid var(--santai-border);
    background: transparent; color: var(--santai-text);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .done-btn:hover { background: var(--santai-bg); }
  .done-btn:active { transform: scale(0.97); }
  .done-btn.completing { opacity: 0.5; pointer-events: none; }

  /* Pulse on urgent */
  .order-card.urgent .card-timer { animation: urgentPulse 1.5s ease-in-out infinite; }
  @keyframes urgentPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* ── SIDEBAR ── */
  .sidebar {
    border-left: 1px solid var(--border);
    overflow-y: auto;
    background: var(--bg2);
    display: flex; flex-direction: column;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .sidebar-section { padding: 16px 18px; border-bottom: 1px solid var(--border); }
  .sidebar-title {
    font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
    color: var(--muted); text-transform: uppercase; margin-bottom: 12px;
  }

  /* Upcoming list */
  .upcoming-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 10px; align-items: flex-start;
  }
  .upcoming-item:last-child { border-bottom: none; }
  .upcoming-date {
    font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
    color: var(--gold); text-transform: uppercase;
    width: 40px; flex-shrink: 0; line-height: 1.3;
  }
  .upcoming-name { font-size: 13px; color: var(--cream); font-weight: 500; }
  .upcoming-items { font-size: 11px; color: var(--subtext); margin-top: 2px; }

  /* Done list */
  .done-item {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--subtext);
    display: flex; align-items: center; gap: 8px;
  }
  .done-item:last-child { border-bottom: none; }
  .done-check { color: var(--santai-text); font-size: 14px; }

  .empty-msg { font-size: 13px; color: var(--muted); text-align: center; padding: 20px 0; }

  /* ── LAST UPDATED ── */
  .last-updated {
    padding: 10px 18px;
    font-size: 10px; color: var(--muted); text-align: center;
    border-top: 1px solid var(--border);
    margin-top: auto; flex-shrink: 0;
  }

  /* ── CREW MODAL ── */
  #crew-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(10,8,6,0.85); backdrop-filter: blur(8px);
    z-index: 200; align-items: center; justify-content: center;
  }
  #crew-modal.active { display: flex; }
  .modal-box {
    background: var(--bg2); border: 1.5px solid var(--border);
    border-radius: 18px; padding: 28px;
    width: 340px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: modalIn 0.25s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes modalIn { from { transform:scale(0.85); opacity:0; } to { transform:scale(1); opacity:1; } }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--cream); margin-bottom: 6px; }
  .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  #crew-input {
    width: 100%; padding: 14px; border-radius: 10px;
    border: 1.5px solid var(--border); background: var(--bg3);
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px;
    outline: none; margin-bottom: 16px; text-align: center;
  }
  #crew-input:focus { border-color: var(--gold); }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btn {
    flex: 1; padding: 12px; border-radius: 10px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    transition: all 0.2s;
  }
  .modal-btn.cancel { background: var(--bg3); border: 1px solid var(--border); color: var(--muted); }
  .modal-btn.confirm { background: var(--gold); border: none; color: #fff; }
  .modal-btn.confirm:hover { background: var(--gold-lt); }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg2); border: 1px solid var(--border);
    color: var(--text); padding: 12px 24px; border-radius: 30px;
    font-size: 13px; font-weight: 500;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    z-index: 999; white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  #toast.show  { transform: translateX(-50%) translateY(0); }
  #toast.ok    { border-color: var(--santai-border); color: var(--santai-text); }
  #toast.err   { border-color: var(--urgent-border); color: var(--urgent-text); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-area">
    <div class="logo">Sugarush</div>
    <div class="logo-sub">/ Kitchen</div>
  </div>
  <div class="clock-area">
    <div id="clock">00:00:00</div>
    <div id="date-label">—</div>
  </div>
  <div class="refresh-area">
    <button id="refresh-btn" onclick="loadData()">↻ Refresh</button>
    <div id="countdown">Refresh dalam —</div>
  </div>
</header>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat">
    <div class="stat-num active" id="stat-active">—</div>
    <div class="stat-label">Order<br>Hari Ini</div>
  </div>
  <div class="stat">
    <div class="stat-num working" id="stat-working">—</div>
    <div class="stat-label">Sedang<br>Dikerjakan</div>
  </div>
  <div class="stat">
    <div class="stat-num done" id="stat-done">—</div>
    <div class="stat-label">Selesai<br>Hari Ini</div>
  </div>
  <div class="stat">
    <div class="stat-num week" id="stat-week">—</div>
    <div class="stat-label">Order<br>Minggu Ini</div>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <!-- ORDER LIST -->
  <div class="orders-panel">
    <div class="panel-title">
      <span>📋 Order Aktif Hari Ini</span>
      <span class="panel-count" id="active-count">— order</span>
    </div>
    <div id="orders-container">
      <div class="empty-msg">Memuat data...</div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">📅 Upcoming 7 Hari</div>
      <div id="upcoming-container"><div class="empty-msg">—</div></div>
    </div>
    <div class="sidebar-section" style="flex:1">
      <div class="sidebar-title">✅ Selesai Hari Ini</div>
      <div id="done-container"><div class="empty-msg">Belum ada yang selesai</div></div>
    </div>
    <div class="last-updated">Terakhir diperbarui: <span id="last-updated-time">—</span></div>
  </div>
</div>

<!-- CREW MODAL -->
<div id="crew-modal">
  <div class="modal-box">
    <div class="modal-title">Order Selesai ✅</div>
    <div class="modal-sub" id="modal-order-label">Siapa yang mengerjakan?</div>
    <input type="text" id="crew-input" placeholder="Nama kru..." autocomplete="off">
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">Batal</button>
      <button class="modal-btn confirm" onclick="confirmComplete()">Konfirmasi</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbywPa-h72ZsiiIWV19ZzzkkSSxvkeJZSHPaok1OpL5o4lvOL6T_i4E2I4fQD4k5qhnL/exec';
const DEMO_MODE = false; // Ganti false setelah deploy
const REFRESH_INTERVAL = 30; // detik

// ── STATE ────────────────────────────────────────────────────
let allOrders   = [];
let doneOrders  = [];
let upcomingOrders = [];
let weekCount   = 0;
let pendingCompleteId = null;
let refreshCountdown  = REFRESH_INTERVAL;
let refreshTimer      = null;
let countdownTimer    = null;

// ── DEMO DATA ────────────────────────────────────────────────
const DEMO_DATA = {
  today: [
    {
      orderId: 'ORD-004', customer: { name:'Ahmad Fauzi', phone:'0812345' },
      metode: 'delivery', address: 'Jl. Mulawarman No.30',
      deadline: todayAt(9,33),
      items: [{ name:'Cheesecake New York', qty:1 },{ name:'Brownies Premium', qty:4 }],
      kitchenNote: 'Cheesecake tanpa topping, plain saja sesuai permintaan.',
      barNote: 'Packaging standar oke, tapi minta bubble wrap ekstra untuk cheesecake.',
      priorityTier: 'urgent', priorityScore: 44, status: 'active',
    },
    {
      orderId: 'ORD-001', customer: { name:'Rina Safitri', phone:'0813456' },
      metode: 'delivery', address: 'Jl. Sungai Mahakam No.12',
      deadline: todayAt(10,18),
      items: [{ name:'Birthday Cake 20cm', qty:1 },{ name:'Croissant Coklat', qty:3 },{ name:'Red Velvet Slice', qty:2 }],
      kitchenNote: 'Tulisan di cake: "Happy Birthday Mama" dengan fondant merah. Dekorasi bunga mawar.',
      barNote: 'Tambahkan 1 box packaging premium + pita emas. Sisipkan kartu ucapan.',
      priorityTier: 'tinggi', priorityScore: 89, status: 'active',
    },
    {
      orderId: 'ORD-002', customer: { name:'Budi Santoso', phone:'0814567' },
      metode: 'pickup', address: '',
      deadline: todayAt(11,48),
      items: [{ name:'Tart Buah Mix', qty:1 },{ name:'Eclair Vanilla', qty:6 }],
      kitchenNote: 'Tart pakai buah strawberry segar, bukan kalengan.',
      barNote: '',
      priorityTier: 'normal', priorityScore: 179, status: 'active',
    },
    {
      orderId: 'ORD-003', customer: { name:'Sari Dewi', phone:'0815678' },
      metode: 'delivery', address: 'Jl. Pahlawan No.5',
      deadline: todayAt(13,48),
      items: [{ name:'Cookies Eid Box', qty:2 }],
      kitchenNote: '',
      barNote: 'Box Eid premium, wrap plastik + pita merah, tambah stiker Sugarush.',
      priorityTier: 'santai', priorityScore: 299, status: 'active',
    },
  ],
  doneToday: 0,
  upcoming: [
    { orderId:'ORD-U1', customer:{name:'Novi Andriani'}, deadline: tomorrowAt(10,0), items:[{name:'Wedding Cake',qty:1},{name:'Cookies',qty:50}], metode:'delivery' },
    { orderId:'ORD-U2', customer:{name:'PT. Borneo Corp'}, deadline: tomorrowAt(12,0), items:[{name:'Snack Box',qty:30}], metode:'delivery' },
    { orderId:'ORD-U3', customer:{name:'Kevin Halim'}, deadline: daysLaterAt(2,10,0), items:[{name:'Birthday Cake 2 tier',qty:1}], metode:'pickup' },
    { orderId:'ORD-U4', customer:{name:'Sifa Rahayu'}, deadline: daysLaterAt(3,14,0), items:[{name:'Tart',qty:1},{name:'Eclair',qty:12}], metode:'delivery' },
    { orderId:'ORD-U5', customer:{name:'Andi Prasetyo'}, deadline: daysLaterAt(5,16,0), items:[{name:'Custom Cookies',qty:100}], metode:'pickup' },
  ],
  stats: { activeToday:4, doneToday:0, upcomingCount:5, lastSync: new Date().toISOString() },
};

function todayAt(h,m) {
  const d = new Date(); d.setHours(h,m,0,0); return d.toISOString();
}
function tomorrowAt(h,m) {
  const d = new Date(); d.setDate(d.getDate()+1); d.setHours(h,m,0,0); return d.toISOString();
}
function daysLaterAt(days,h,m) {
  const d = new Date(); d.setDate(d.getDate()+days); d.setHours(h,m,0,0); return d.toISOString();
}

// ── INIT ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  startClock();
  loadData();
  startRefreshLoop();
});

// ── CLOCK ────────────────────────────────────────────────────
function startClock() {
  const tick = () => {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('id-ID', { hour12:false });
    document.getElementById('date-label').textContent = now.toLocaleDateString('id-ID', {
      weekday:'long', day:'numeric', month:'short', year:'numeric'
    });
    updateCardTimers();
  };
  tick();
  setInterval(tick, 1000);
}

// ── REFRESH LOOP ──────────────────────────────────────────────
function startRefreshLoop() {
  clearInterval(refreshTimer);
  clearInterval(countdownTimer);
  refreshCountdown = REFRESH_INTERVAL;

  countdownTimer = setInterval(() => {
    refreshCountdown--;
    document.getElementById('countdown').textContent =
      `Refresh dalam ${refreshCountdown}d`;
    if (refreshCountdown <= 0) {
      loadData();
      refreshCountdown = REFRESH_INTERVAL;
    }
  }, 1000);
}

// ── LOAD DATA ─────────────────────────────────────────────────
async function loadData() {
  refreshCountdown = REFRESH_INTERVAL;

  if (DEMO_MODE) {
    renderDashboard(DEMO_DATA.today, DEMO_DATA.upcoming, DEMO_DATA.doneToday, DEMO_DATA.stats);
    return;
  }

  try {
    const res  = await fetch(APPS_SCRIPT_URL + '?action=getDashboard');
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    renderDashboard(data.today, data.upcoming, data.stats.doneToday, data.stats);
  } catch (err) {
    console.error('Load error:', err);
    showToast('⚠️ Gagal memuat data', 'err');
  }
}

// ── RENDER DASHBOARD ──────────────────────────────────────────
function renderDashboard(todayOrders, upcoming, doneToday, stats) {
  // Recalc & re-sort
  todayOrders.forEach(o => {
    o.priorityScore = calcEffectiveMinutes(o);
    o.priorityTier  = getTier(o.priorityScore);
  });
  todayOrders.sort((a,b) => a.priorityScore - b.priorityScore);

  allOrders      = todayOrders;
  upcomingOrders = upcoming || [];
  weekCount      = stats?.upcomingCount || 0;

  renderOrders();
  renderUpcoming();
  renderStats(doneToday, stats);

  const now = new Date();
  document.getElementById('last-updated-time').textContent =
    now.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

// ── RENDER ORDERS ─────────────────────────────────────────────
function renderOrders() {
  const container = document.getElementById('orders-container');
  document.getElementById('active-count').textContent = `${allOrders.length} order`;

  if (allOrders.length === 0) {
    container.innerHTML = '<div class="empty-msg">🎉 Tidak ada order aktif hari ini</div>';
    return;
  }

  container.innerHTML = allOrders.map(o => buildCard(o)).join('');
}

function buildCard(o) {
  const tier      = o.priorityTier || 'santai';
  const score     = o.priorityScore;
  const deadline  = new Date(o.deadline);
  const diffMin   = Math.round((deadline - new Date()) / 60000);
  const timerStr  = formatTimer(diffMin);
  const deadlineFmt = deadline.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });

  const metaIcon = o.metode === 'delivery'
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg> ${o.address || 'Alamat tidak ada'} – Delivery`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Pickup langsung – pukul ${deadlineFmt}`;

  const itemsHtml = (o.items || []).map(it =>
    `<div class="item-line"><span>${it.name}</span><span class="item-qty-badge">×${it.qty}</span></div>`
  ).join('');

  const kitchenNote = o.kitchenNote
    ? `<div class="note-block kitchen"><div class="note-label">🔥 Kitchen Note</div>${o.kitchenNote}</div>` : '';
  const barNote = o.barNote
    ? `<div class="note-block bar"><div class="note-label">🎀 Bar / Packaging Note</div>${o.barNote}</div>` : '';

  return `
  <div class="order-card ${tier}" id="card-${o.orderId}">
    <div class="card-top">
      <span class="card-id">${o.orderId}</span>
      <span class="card-timer ${tier}" id="timer-${o.orderId}" data-diff="${diffMin}">${timerStr}</span>
    </div>
    <div class="card-body">
      <div class="card-name">${o.customer.name}</div>
      <div class="card-meta">${metaIcon}</div>
      <div class="items-list">${itemsHtml}</div>
      ${kitchenNote}${barNote}
    </div>
    <div class="card-footer">
      <div>
        <div class="deadline-str">Harus siap</div>
        <div class="deadline-time">${deadlineFmt}</div>
      </div>
      <button class="done-btn" id="done-btn-${o.orderId}" onclick="startComplete('${o.orderId}')">✓ Selesai</button>
    </div>
  </div>`;
}

function updateCardTimers() {
  allOrders.forEach(o => {
    const timerEl = document.getElementById(`timer-${o.orderId}`);
    if (!timerEl) return;
    const deadline = new Date(o.deadline);
    const diffMin  = Math.round((deadline - new Date()) / 60000);
    timerEl.textContent = formatTimer(diffMin);

    // Update tier class if changed
    const newTier = getTier(calcEffectiveMinutes(o));
    if (newTier && newTier !== o.priorityTier) {
      o.priorityTier = newTier;
      const card = document.getElementById(`card-${o.orderId}`);
      if (card) {
        card.className = `order-card ${newTier}`;
        timerEl.className = `card-timer ${newTier}`;
      }
    }
  });
}

function formatTimer(diffMin) {
  if (diffMin < 0) return `⚠️ ${Math.abs(diffMin)} mnt lewat`;
  const h = Math.floor(diffMin / 60), m = diffMin % 60;
  return h > 0 ? `${h}j ${m}m lagi` : `${m} mnt lagi`;
}

// ── RENDER UPCOMING ───────────────────────────────────────────
function renderUpcoming() {
  const container = document.getElementById('upcoming-container');
  if (!upcomingOrders.length) {
    container.innerHTML = '<div class="empty-msg">Tidak ada order upcoming</div>';
    return;
  }
  container.innerHTML = upcomingOrders.map(o => {
    const d = new Date(o.deadline);
    const dayStr = d.toLocaleDateString('id-ID', { weekday:'short', day:'numeric', month:'short' });
    const itemStr = (o.items || []).map(it => `${it.name} ×${it.qty}`).join(', ');
    return `
    <div class="upcoming-item">
      <div class="upcoming-date">${dayStr}</div>
      <div>
        <div class="upcoming-name">${o.customer.name}</div>
        <div class="upcoming-items">${itemStr}</div>
      </div>
    </div>`;
  }).join('');
}

// ── RENDER STATS ──────────────────────────────────────────────
function renderStats(doneToday, stats) {
  const active  = allOrders.length;
  const working = allOrders.filter(o => o.status === 'working').length;
  document.getElementById('stat-active').textContent  = active;
  document.getElementById('stat-working').textContent = working;
  document.getElementById('stat-done').textContent    = doneToday ?? 0;
  document.getElementById('stat-week').textContent    = (stats?.upcomingCount ?? 0) + active;
}

// ── MARK COMPLETE ─────────────────────────────────────────────
function startComplete(orderId) {
  pendingCompleteId = orderId;
  const o = allOrders.find(x => x.orderId === orderId);
  document.getElementById('modal-order-label').textContent =
    `${orderId} — ${o?.customer?.name || ''}`;
  document.getElementById('crew-input').value = '';
  document.getElementById('crew-modal').classList.add('active');
  setTimeout(() => document.getElementById('crew-input').focus(), 100);
}

function closeModal() {
  document.getElementById('crew-modal').classList.remove('active');
  pendingCompleteId = null;
}

async function confirmComplete() {
  if (!pendingCompleteId) return;
  const crewName = document.getElementById('crew-input').value.trim();
  if (!crewName) {
    document.getElementById('crew-input').style.borderColor = '#D94F3D';
    return;
  }
  closeModal();

  const orderId = pendingCompleteId;
  const btn = document.getElementById(`done-btn-${orderId}`);
  if (btn) { btn.classList.add('completing'); btn.textContent = '...'; }

  if (DEMO_MODE) {
    await sleep(800);
    removeOrderCard(orderId);
    addDoneEntry(orderId, crewName);
    const doneNow = parseInt(document.getElementById('stat-done').textContent || '0') + 1;
    document.getElementById('stat-done').textContent = doneNow;
    document.getElementById('stat-active').textContent = allOrders.length;
    showToast(`✅ ${orderId} selesai dikerjakan ${crewName}`, 'ok');
    return;
  }

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action:'markComplete', orderId, crewName }),
    });
    removeOrderCard(orderId);
    addDoneEntry(orderId, crewName);
    const doneNow = parseInt(document.getElementById('stat-done').textContent || '0') + 1;
    document.getElementById('stat-done').textContent = doneNow;
    document.getElementById('stat-active').textContent = allOrders.length;
    showToast(`✅ ${orderId} selesai!`, 'ok');
  } catch (err) {
    if (btn) { btn.classList.remove('completing'); btn.textContent = '✓ Selesai'; }
    showToast('❌ Koneksi gagal', 'err');
    console.error(err);
  }
}

function removeOrderCard(orderId) {
  allOrders = allOrders.filter(o => o.orderId !== orderId);
  const card = document.getElementById(`card-${orderId}`);
  if (card) {
    card.style.transition = 'opacity 0.3s, transform 0.3s';
    card.style.opacity = '0'; card.style.transform = 'scale(0.95)';
    setTimeout(() => card.remove(), 320);
  }
  document.getElementById('active-count').textContent = `${allOrders.length} order`;
  document.getElementById('stat-active').textContent  = allOrders.length;
}

function addDoneEntry(orderId, crewName) {
  const container = document.getElementById('done-container');
  const emptyMsg  = container.querySelector('.empty-msg');
  if (emptyMsg) emptyMsg.remove();
  const now = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  const el  = document.createElement('div');
  el.className = 'done-item';
  el.innerHTML = `<span class="done-check">✓</span><span>${orderId} — ${crewName} <span style="opacity:0.5;font-size:11px">${now}</span></span>`;
  container.insertBefore(el, container.firstChild);
}

// ── PRIORITY ENGINE ───────────────────────────────────────────
function calcEffectiveMinutes(o) {
  const now      = new Date();
  const deadline = new Date(o.deadline);
  const diffMin  = (deadline - now) / 60000;
  let eff        = diffMin;

  if (o.metode === 'delivery') eff -= 20;
  const items = o.items || [];
  if (items.length >= 6)       eff -= 30;
  else if (items.length >= 3)  eff -= 15;
  if (o.kitchenNote && o.kitchenNote.trim()) eff -= 10;
  const totalQty = items.reduce((s,i) => s + (i.qty||1), 0);
  if (totalQty > 5) eff -= 10;

  // Early-morning rule
  const n = new Date(now); n.setHours(0,0,0,0);
  const d = new Date(deadline); d.setHours(0,0,0,0);
  if (
    (d - n) === 86400000 &&
    deadline.getHours() >= 8 && deadline.getHours() < 10 &&
    now.getHours() >= 19
  ) eff = 150;

  return Math.round(eff);
}

function getTier(score) {
  if (score < 90)  return 'urgent';
  if (score < 240) return 'tinggi';
  if (score < 330) return 'normal';
  return 'santai';
}

// ── HELPERS ───────────────────────────────────────────────────
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

let toastTimer;
function showToast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3500);
}

// Close modal on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('crew-modal').classList.contains('active')) {
    confirmComplete();
  }
});
</script>
