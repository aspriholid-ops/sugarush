<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sugarush Kitchen Display</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --urgent:#D94F3D;--tinggi:#E07C2A;--normal:#C8973A;--santai:#3A7D44;
  --bg:#1A1A1A;--bg2:#242424;--border:#333;--text:#F0F0F0;--sub:#888;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
/* TOPBAR */
.topbar{background:#111;border-bottom:2px solid #2A2A2A;height:54px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-shrink:0}
.logo{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:#C8973A;letter-spacing:.1em}
.stats{display:flex;gap:6px}
.sp{display:flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid #2A2A2A;border-radius:4px;background:#1A1A1A}
.sp .n{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}
.sp .n.a{color:#C8973A}.sp .n.w{color:#D94F3D}.sp .n.d{color:#3A7D44}.sp .n.wk{color:#6A9BD8}
.sp .l{font-size:9px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.08em;line-height:1.3}
.clk{text-align:right;flex-shrink:0}
#clock{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;letter-spacing:.04em}
#dateLbl{font-size:10px;color:#555;margin-top:1px}
/* BODY */
.body{display:flex;flex:1;overflow:hidden}
/* ORDERS */
.orders{flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{background:#111;border-bottom:1px solid #2A2A2A;padding:7px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.t-left{display:flex;align-items:center;gap:10px}
.t-title{font-size:10px;font-weight:700;letter-spacing:.12em;color:#555;text-transform:uppercase}
.t-badge{background:#C8973A;color:#111;font-size:11px;font-weight:700;padding:2px 10px;border-radius:3px}
.t-right{display:flex;align-items:center;gap:8px;font-size:11px;color:#555}
.rbtn{background:#2A2A2A;border:1px solid #3A3A3A;color:#777;font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif}
.rbtn:hover{border-color:#C8973A;color:#C8973A}
/* GRID */
.scroll{flex:1;overflow-y:auto;padding:10px;scrollbar-width:thin;scrollbar-color:#2A2A2A transparent}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px;align-items:start}
/* CARD */
.card{border-radius:5px;overflow:hidden;border:1px solid #2A2A2A;background:var(--bg2);animation:ci .25s ease;display:flex;flex-direction:column}
@keyframes ci{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ch{padding:10px 12px 8px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card.urgent .ch{background:var(--urgent)}.card.tinggi .ch{background:var(--tinggi)}.card.normal .ch{background:var(--normal)}.card.santai .ch{background:var(--santai)}
.ch-l{display:flex;flex-direction:column;gap:2px}
.c-time{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:#fff;line-height:1}
.c-timer-row{display:flex;align-items:center;gap:5px;margin-top:3px}
.c-timer{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;background:rgba(0,0,0,.25);color:#fff;padding:2px 7px;border-radius:3px}
.c-id{font-size:9px;font-weight:600;color:rgba(255,255,255,.65);letter-spacing:.06em}
.ch-r{text-align:right;flex-shrink:0}
.c-name{font-size:13px;font-weight:700;color:#fff;line-height:1.2}
.c-meta{font-size:10px;color:rgba(255,255,255,.7);margin-top:2px}
.card.urgent .c-time{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.cb{padding:10px 12px;flex:1}
.item-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid #2E2E2E;font-size:13px;color:#DDD}
.item-row:last-child{border-bottom:none}
.iq{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:#C8973A;margin-left:8px;flex-shrink:0}
.note{margin-top:8px;padding:7px 10px;border-radius:4px;font-size:12px;line-height:1.5}
.note.k{background:rgba(217,79,61,.15);border-left:3px solid #D94F3D;color:#F08070}
.note.b{background:rgba(106,91,206,.15);border-left:3px solid #6A5BCE;color:#A090E8}
.nlbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px;opacity:.75}
.cf{padding:8px 12px;background:#181818;border-top:1px solid #2A2A2A;display:flex;align-items:center;justify-content:space-between}
.dl-info{font-size:11px;color:#666}
.dl-time{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#DDD}
.selesai{background:#1E3D22;border:1px solid #3A7D44;color:#7DD88A;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;padding:7px 16px;border-radius:4px;cursor:pointer;letter-spacing:.05em;text-transform:uppercase;transition:all .15s}
.selesai:hover{background:#3A7D44;color:#fff}.selesai:active{transform:scale(.97)}
.selesai.completing{opacity:.5;pointer-events:none}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:#444;font-size:15px}
/* SIDEBAR */
.sidebar{width:210px;flex-shrink:0;background:#1C1C1C;border-left:1px solid #2A2A2A;display:flex;flex-direction:column;overflow:hidden}
.s-section{padding:10px 13px;border-bottom:1px solid #242424;flex-shrink:0}
.s-title{font-size:9px;font-weight:700;letter-spacing:.15em;color:#444;text-transform:uppercase;margin-bottom:0}
.up-list{flex:1;overflow-y:auto;padding:0 13px;scrollbar-width:thin;scrollbar-color:#2A2A2A transparent}
.up-item{padding:8px 0;border-bottom:1px solid #222;display:flex;gap:8px}
.up-item:last-child{border-bottom:none}
.up-date{font-size:9px;font-weight:700;color:#C8973A;text-transform:uppercase;letter-spacing:.04em;line-height:1.4;min-width:30px;flex-shrink:0}
.up-name{font-size:12px;font-weight:600;color:#CCC}
.up-items{font-size:10px;color:#555;margin-top:1px;line-height:1.4}
.done-section{padding:10px 13px;border-top:1px solid #242424;flex-shrink:0}
.done-list{display:flex;flex-direction:column;gap:4px;max-height:100px;overflow-y:auto;margin-top:6px}
.done-item{font-size:11px;color:#555;display:flex;align-items:center;gap:5px}
.d-check{color:#3A7D44;font-size:12px}
.sync{padding:5px 13px;font-size:9px;color:#3A3A3A;border-top:1px solid #222;flex-shrink:0}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center}
.modal-bg.active{display:flex}
.modal{background:#222;border:1px solid #3A3A3A;border-radius:8px;padding:26px 22px;width:310px;text-align:center;animation:mi .2s ease}
@keyframes mi{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal h3{font-size:17px;font-weight:700;color:#F0F0F0;margin-bottom:4px}
.modal p{font-size:12px;color:#666;margin-bottom:16px}
.modal input{width:100%;background:#2A2A2A;border:1px solid #3A3A3A;border-radius:6px;padding:11px;color:#F0F0F0;font-family:'DM Sans',sans-serif;font-size:15px;text-align:center;margin-bottom:14px;outline:none}
.modal input:focus{border-color:#3A7D44}
.m-btns{display:flex;gap:8px}
.m-btn{flex:1;padding:10px;border-radius:5px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.05em}
.m-btn.cancel{background:#2A2A2A;border:1px solid #3A3A3A;color:#666}
.m-btn.ok{background:#1E3D22;border:1px solid #3A7D44;color:#7DD88A}
.m-btn.ok:hover{background:#3A7D44;color:#fff}
/* TOAST */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);background:#222;border:1px solid #3A3A3A;color:#F0F0F0;padding:9px 20px;border-radius:30px;font-size:13px;font-weight:500;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5)}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:#3A7D44;color:#7DD88A}
#toast.err{border-color:#D94F3D;color:#F08070}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
  <svg width="36" height="36" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Shadow/3D layer -->
    <polygon points="52,8 58,32 78,22 68,44 92,46 74,60 86,82 62,72 58,96 44,76 22,88 30,64 8,56 28,44 18,22 42,32" fill="#C0392B" transform="translate(4,4)"/>
    <!-- Main star -->
    <polygon points="52,8 58,32 78,22 68,44 92,46 74,60 86,82 62,72 58,96 44,76 22,88 30,64 8,56 28,44 18,22 42,32" fill="#F5C518" stroke="#E8450A" stroke-width="3" stroke-linejoin="round"/>
  </svg>
  <span style="font-size:13px;letter-spacing:.12em;color:#F5C518;font-weight:700;">SUGARUSH</span>
  <span style="color:#444;font-size:13px;font-weight:400;letter-spacing:.05em;">ORDER</span>
</div>
  <div class="stats">
    <div class="sp"><span class="n a" id="sA">—</span><span class="l">Order<br>Hari Ini</span></div>
    <div class="sp"><span class="n w" id="sW">—</span><span class="l">Sedang<br>Dikerjakan</span></div>
    <div class="sp"><span class="n d" id="sD">—</span><span class="l">Selesai<br>Hari Ini</span></div>
    <div class="sp"><span class="n wk" id="sK">—</span><span class="l">Order<br>Minggu Ini</span></div>
  </div>
  <div class="clk"><div id="clock">00:00:00</div><div id="dateLbl">—</div></div>
</div>

<div class="body">
  <div class="orders">
    <div class="toolbar">
      <div class="t-left">
        <span class="t-title">Order Aktif Hari Ini</span>
        <span class="t-badge" id="cnt">0</span>
      </div>
      <div class="t-right">
        <span id="cd">—</span>
        <button class="rbtn" onclick="loadData()">↻ Refresh</button>
      </div>
    </div>
    <div class="scroll"><div class="grid" id="grid"><div class="empty">Memuat data...</div></div></div>
  </div>

  <div class="sidebar">
    <div class="s-section"><div class="s-title">📅 Upcoming 7 Hari</div></div>
    <div class="up-list" id="upList"><div style="padding:20px 0;text-align:center;color:#444;font-size:11px;">—</div></div>
    <div class="done-section">
      <div class="s-title">✅ Selesai Hari Ini</div>
      <div class="done-list" id="doneList"><div style="color:#3A3A3A;font-size:11px;">Belum ada</div></div>
    </div>
    <div class="sync">Diperbarui: <span id="syncTime">—</span></div>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>✅ Order Selesai</h3>
    <p id="mLbl">Siapa yang mengerjakan?</p>
    <input type="text" id="crewIn" placeholder="Nama kru...">
    <div class="m-btns">
      <button class="m-btn cancel" onclick="closeModal()">Batal</button>
      <button class="m-btn ok" onclick="confirmDone()">▶ Selesai</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>

// ── AUDIO ENGINE ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;

function getCtx() {
  if (!actx) actx = new AudioCtx();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}

function playBell() {
  // Lonceng — order masuk
  const ctx = getCtx();
  const t = ctx.currentTime;
  [0, 0.15, 0.3].forEach((delay, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, t + delay);
    osc.frequency.exponentialRampToValueAtTime(660, t + delay + 0.4);
    gain.gain.setValueAtTime(0, t + delay);
    gain.gain.linearRampToValueAtTime(0.4 - i*0.1, t + delay + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.6);
    osc.start(t + delay);
    osc.stop(t + delay + 0.6);
  });
}

function playCricket() {
  // Kricket — order selesai
  const ctx = getCtx();
  const t = ctx.currentTime;
  for (let r = 0; r < 2; r++) {
    const rOff = r * 0.25;
    for (let i = 0; i < 6; i++) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(3200 + (i % 2) * 400, t + rOff + i * 0.03);
      gain.gain.setValueAtTime(0.08, t + rOff + i * 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, t + rOff + i * 0.03 + 0.025);
      osc.start(t + rOff + i * 0.03);
      osc.stop(t + rOff + i * 0.03 + 0.025);
    }
  }
}

// Unlock audio on first user interaction
document.addEventListener('click', () => getCtx(), { once: true });
document.addEventListener('keydown', () => getCtx(), { once: true });

const URL_AS = 'https://script.google.com/macros/s/AKfycbywPa-h72ZsiiIWV19ZzzkkSSxvkeJZSHPaok1OpL5o4lvOL6T_i4E2I4fQD4k5qhnL/exec';
const DEMO = false;
const RI = 30;
let orders=[], upcoming=[], doneCount=0, pendingId=null, rc=RI;

function dAt(n,h,m){const d=new Date();d.setDate(d.getDate()+n);d.setHours(h,m,0,0);return d.toISOString();}
const DDATA={
  today:[
    {orderId:'ORD-004',customer:{name:'Ahmad Fauzi'},metode:'delivery',address:'Jl. Mulawarman No.30',deadline:dAt(0,14,33),items:[{name:'Cheesecake New York',qty:1},{name:'Brownies Premium',qty:4}],kitchenNote:'Cheesecake tanpa topping, plain saja.',barNote:'Bubble wrap ekstra.',priorityTier:'urgent',priorityScore:20,status:'active'},
    {orderId:'ORD-001',customer:{name:'Rina Safitri'},metode:'delivery',address:'Jl. Sungai Mahakam No.12',deadline:dAt(0,15,18),items:[{name:'Birthday Cake 20cm',qty:1},{name:'Croissant Coklat',qty:3},{name:'Red Velvet Slice',qty:2}],kitchenNote:'Tulisan "Happy Birthday Mama" fondant merah.',barNote:'Box premium + pita emas.',priorityTier:'tinggi',priorityScore:89,status:'active'},
    {orderId:'ORD-002',customer:{name:'Budi Santoso'},metode:'pickup',address:'',deadline:dAt(0,16,0),items:[{name:'Tart Buah Mix',qty:1},{name:'Eclair Vanilla',qty:6}],kitchenNote:'Tart pakai strawberry segar.',barNote:'',priorityTier:'normal',priorityScore:200,status:'active'},
    {orderId:'ORD-003',customer:{name:'Sari Dewi'},metode:'delivery',address:'Jl. Pahlawan No.5',deadline:dAt(0,17,30),items:[{name:'Cookies Eid Box',qty:2}],kitchenNote:'',barNote:'Box Eid premium, pita merah.',priorityTier:'santai',priorityScore:310,status:'active'},
  ],
  upcoming:[
    {orderId:'U1',customer:{name:'Novi Andriani'},deadline:dAt(1,10,0),items:[{name:'Wedding Cake',qty:1},{name:'Cookies',qty:50}],metode:'delivery'},
    {orderId:'U2',customer:{name:'PT. Borneo Corp'},deadline:dAt(1,12,0),items:[{name:'Snack Box',qty:30}],metode:'delivery'},
    {orderId:'U3',customer:{name:'Kevin Halim'},deadline:dAt(2,10,0),items:[{name:'Birthday Cake 2 tier',qty:1}],metode:'pickup'},
    {orderId:'U4',customer:{name:'Sifa Rahayu'},deadline:dAt(3,14,0),items:[{name:'Tart',qty:1},{name:'Eclair',qty:12}],metode:'delivery'},
    {orderId:'U5',customer:{name:'Andi Prasetyo'},deadline:dAt(5,16,0),items:[{name:'Custom Cookies',qty:100}],metode:'pickup'},
  ],
  doneToday:0,stats:{upcomingCount:5}
};

document.addEventListener('DOMContentLoaded',()=>{
  startClock(); loadData();
  setInterval(()=>{rc--;document.getElementById('cd').textContent=`Refresh dalam ${rc}d`;if(rc<=0){loadData();rc=RI;}},1000);
});

function startClock(){
  const t=()=>{
    const n=new Date();
    document.getElementById('clock').textContent=n.toLocaleTimeString('id-ID',{hour12:false});
    document.getElementById('dateLbl').textContent=n.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'short',year:'numeric'});
    tickTimers();
  };
  t(); setInterval(t,1000);
}

async function loadData(){
  rc=RI;
  if(DEMO){render(DDATA.today,DDATA.upcoming,DDATA.doneToday,DDATA.stats);return;}
  try{
    const r=await fetch(URL_AS+'?action=getDashboard');
    const d=await r.json();
    if(!d.ok)throw new Error(d.error);
    render(d.today,d.upcoming,d.stats.doneToday,d.stats);
  }catch(e){toast('⚠️ Gagal memuat data','err');}
}

let prevOrderIds = new Set();

function render(tod,up,done,stats){
  tod.forEach(o=>{o.priorityScore=score(o);o.priorityTier=tier(o.priorityScore);});
  tod.sort((a,b)=>a.priorityScore-b.priorityScore);
  // Detect new orders → play bell
  const newIds = new Set(tod.map(o=>o.orderId));
  let hasNew = false;
  newIds.forEach(id=>{ if(!prevOrderIds.has(id)) hasNew=true; });
  if(hasNew && prevOrderIds.size > 0) playBell();
  prevOrderIds = newIds;
  orders=tod; upcoming=up||[]; doneCount=done||0;
  renderCards(); renderUp(); renderStats(stats);
  document.getElementById('syncTime').textContent=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function renderCards(){
  const g=document.getElementById('grid');
  document.getElementById('cnt').textContent=orders.length;
  document.getElementById('sA').textContent=orders.length;
  if(!orders.length){g.innerHTML='<div class="empty">🎉 Tidak ada order aktif hari ini</div>';return;}
  g.innerHTML=orders.map(card).join('');
}

function card(o){
  const t=o.priorityTier||'santai';
  const dl=new Date(o.deadline);
  const diff=Math.round((dl-new Date())/60000);
  const dlF=dl.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  const meta=o.metode==='delivery'?`🛵 ${o.address||'—'}`:`🚶 Pickup · ${dlF}`;
  const items=(o.items||[]).map(i=>`<div class="item-row"><span>${i.name}</span><span class="iq">${i.qty}x</span></div>`).join('');
  const kn=o.kitchenNote?`<div class="note k"><div class="nlbl">🔥 Kitchen Note</div>${o.kitchenNote}</div>`:'';
  const bn=o.barNote?`<div class="note b"><div class="nlbl">🎀 Bar / Packaging</div>${o.barNote}</div>`:'';
  return `<div class="card ${t}" id="card-${o.orderId}">
    <div class="ch">
      <div class="ch-l">
        <div class="c-time">${dlF}</div>
        <div class="c-timer-row"><span class="c-timer" id="tmr-${o.orderId}">${fmt(diff)}</span><span class="c-id">${o.orderId}</span></div>
      </div>
      <div class="ch-r"><div class="c-name">${o.customer.name}</div><div class="c-meta">${meta}</div></div>
    </div>
    <div class="cb"><div>${items}</div>${kn}${bn}</div>
    <div class="cf">
      <div><div class="dl-info">Harus siap</div><div class="dl-time">${dlF}</div></div>
      <button class="selesai" id="btn-${o.orderId}" onclick="startDone('${o.orderId}')">▶ Selesai</button>
    </div>
  </div>`;
}

function tickTimers(){
  orders.forEach(o=>{
    const el=document.getElementById(`tmr-${o.orderId}`);
    if(!el)return;
    const diff=Math.round((new Date(o.deadline)-new Date())/60000);
    el.textContent=fmt(diff);
    const nt=tier(score(o));
    if(nt!==o.priorityTier){o.priorityTier=nt;const c=document.getElementById(`card-${o.orderId}`);if(c)c.className=`card ${nt}`;}
  });
}

function fmt(m){if(m<0)return`⚠ ${Math.abs(m)}m lewat`;const h=Math.floor(m/60),mn=m%60;return h>0?`${h}j ${mn}m lagi`:`${mn} mnt lagi`;}

function renderUp(){
  const el=document.getElementById('upList');
  if(!upcoming.length){el.innerHTML='<div style="padding:20px 0;text-align:center;color:#444;font-size:11px;">Tidak ada</div>';return;}
  el.innerHTML=upcoming.map(o=>{
    const d=new Date(o.deadline);
    const ds=d.toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short'});
    const its=(o.items||[]).map(i=>`${i.name} ×${i.qty}`).join(', ');
    return `<div class="up-item"><div class="up-date">${ds}</div><div><div class="up-name">${o.customer.name}</div><div class="up-items">${its}</div></div></div>`;
  }).join('');
}

function renderStats(s){
  document.getElementById('sW').textContent=orders.filter(o=>o.status==='working').length;
  document.getElementById('sD').textContent=doneCount;
  document.getElementById('sK').textContent=(s?.upcomingCount||0)+orders.length;
}

function startDone(id){
  pendingId=id;
  const o=orders.find(x=>x.orderId===id);
  document.getElementById('mLbl').textContent=`${id} — ${o?.customer?.name||''}`;
  document.getElementById('crewIn').value='';
  document.getElementById('modal').classList.add('active');
  setTimeout(()=>document.getElementById('crewIn').focus(),100);
}
function closeModal(){document.getElementById('modal').classList.remove('active');pendingId=null;}

async function confirmDone(){
  if(!pendingId)return;
  const crew=document.getElementById('crewIn').value.trim();
  if(!crew){document.getElementById('crewIn').style.borderColor='#D94F3D';return;}
  const id=pendingId;
  closeModal();
  const btn=document.getElementById(`btn-${id}`);
  if(btn){btn.classList.add('completing');btn.textContent='...';}
  if(DEMO){await sl(600);rmCard(id);addDone(id,crew);playCricket();document.getElementById('sD').textContent=++doneCount;document.getElementById('sA').textContent=orders.length;toast(`✅ ${id} selesai!`,'ok');return;}
  try{
    const p=new URLSearchParams({action:'markComplete',orderId:id,crewName:crew});await fetch(URL_AS+'?'+p.toString(),{method:'GET',mode:'no-cors'});
    rmCard(id);addDone(id,crew);
    playCricket();
    document.getElementById('sD').textContent=++doneCount;
    document.getElementById('sA').textContent=orders.length;
    toast(`✅ ${id} selesai!`,'ok');
  }catch(e){if(btn){btn.classList.remove('completing');btn.textContent='▶ Selesai';}toast('❌ Koneksi gagal','err');}
}

function rmCard(id){
  orders=orders.filter(o=>o.orderId!==id);
  const c=document.getElementById(`card-${id}`);
  if(c){c.style.transition='opacity .3s,transform .3s';c.style.opacity='0';c.style.transform='scale(.95)';setTimeout(()=>c.remove(),320);}
  document.getElementById('cnt').textContent=orders.length;
  if(!orders.length)setTimeout(()=>{document.getElementById('grid').innerHTML='<div class="empty">🎉 Semua order selesai!</div>';},400);
}

function addDone(id,crew){
  const el=document.getElementById('doneList');
  const ph=el.querySelector('div[style]');if(ph)ph.remove();
  const t=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  const d=document.createElement('div');d.className='done-item';
  d.innerHTML=`<span class="d-check">✓</span><span>${id} · ${crew} <span style="color:#3A3A3A">${t}</span></span>`;
  el.insertBefore(d,el.firstChild);
}

function score(o){
  const now=new Date(),dl=new Date(o.deadline);
  let e=(dl-now)/60000;
  if(o.metode==='delivery')e-=20;
  const it=o.items||[];
  if(it.length>=6)e-=30;else if(it.length>=3)e-=15;
  if(o.kitchenNote&&o.kitchenNote.trim())e-=10;
  if(it.reduce((s,i)=>s+(i.qty||1),0)>5)e-=10;
  const n=new Date(now);n.setHours(0,0,0,0);const d=new Date(dl);d.setHours(0,0,0,0);
  if((d-n)===86400000&&dl.getHours()>=8&&dl.getHours()<10&&now.getHours()>=19)e=150;
  return Math.round(e);
}
function tier(s){if(s<90)return'urgent';if(s<240)return'tinggi';if(s<330)return'normal';return'santai';}

function sl(ms){return new Promise(r=>setTimeout(r,ms));}
let tT;
function toast(msg,type=''){const el=document.getElementById('toast');el.textContent=msg;el.className='show '+type;clearTimeout(tT);tT=setTimeout(()=>el.className='',3500);}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();if(e.key==='Enter'&&document.getElementById('modal').classList.contains('active'))confirmDone();});
</script>
</body>
</html>
